name: 📰 Daily Auto Publisher

on:
  schedule:
    # Runs at 22:00 UTC (07:00 KST) every day
    - cron: '0 22 * * *'
  # Allows manual triggering
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install

      # ── Phase 1: 데일리 브리핑 (기사) 생성 ─────────────────
      - name: 🤖 Generate Daily Briefing Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/daily-briefing.js

      # ── Phase 2: 카드뉴스 이미지 생성 ──────────────────────
      - name: 📱 Generate Card News Images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-card-news.js

      # ── Phase 3: 블로그 포스트 생성 ────────────────────────
      - name: 📝 Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog-post.js

      # ── 커밋 & 푸시 ────────────────────────────────────────
      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "EconPedia AI Publisher"
          git config --global user.email "actions@github.com"
          git add \
            src/pages/daily/*.astro \
            src/data/daily-articles.json \
            src/pages/blog/*.astro \
            src/data/blog-articles.json \
            public/cards/
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No new content generated."
          else
            git commit -m "docs: Auto-published daily briefing + blog + card news"
            git push origin main
          fi

      # ── 배포 워크플로우 트리거 ──────────────────────────────
      # GITHUB_TOKEN으로 푸시한 커밋은 deploy.yml을 자동 트리거하지 않으므로
      # GitHub API를 통해 workflow_dispatch로 직접 호출합니다.
      - name: 🚀 Trigger Deploy Workflow
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DEPLOY_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}' \
          && echo "✅ Deploy workflow triggered" \
          || echo "⚠️ Deploy trigger failed (non-critical)"

      # ── 뉴스레터 이메일 발송 ─────────────────────────────
      - name: 📧 Send Newsletter Email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM || 'EconPedia <onboarding@resend.dev>' }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
        run: node scripts/send-newsletter.js

      # ── 슬랙 현황 리포트 발송 ─────────────────────────────
      - name: 💬 Send Slack Status Report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/send-slack-status.js
