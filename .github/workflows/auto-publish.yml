name: 📰 Daily Auto Publisher

on:
  schedule:
    # Runs at 22:00 UTC (07:00 KST) every day
    - cron: '0 22 * * *'
  # Allows manual triggering
  workflow_dispatch:

# 동시 실행 방지: 이미 실행 중이면 대기 (cancel 하지 않음)
concurrency:
  group: auto-publish
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install

      # ── Phase 1: 데일리 브리핑 (기사) 생성 ─────────────────
      - name: 🤖 Generate Daily Briefing Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/daily-briefing.js

      # ── Phase 2: 카드뉴스 이미지 생성 (월/수/금/일만) ─────────
      - name: 📱 Generate Card News Images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
        run: |
          DAY=$(date -u +%u)  # 1=월 ~ 7=일
          if [[ "$DAY" =~ ^(1|3|5|7)$ ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "📱 카드뉴스 발행일 (요일: $DAY)"
            node scripts/generate-card-news.js
          else
            echo "⏭️ 카드뉴스 비발행일 (요일: $DAY) — 건너뜁니다"
          fi

      # ── Phase 3: 블로그 심층분석 (화/목/일만) ─────────────────
      - name: 📝 Generate Blog Post (Harness)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
        run: |
          DAY=$(date -u +%u)  # 1=월 ~ 7=일
          if [[ "$DAY" =~ ^(2|4|7)$ ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "📝 블로그 심층분석 발행일 (요일: $DAY)"
            node scripts/generate-blog-post.js
          else
            echo "⏭️ 블로그 비발행일 (요일: $DAY) — 건너뜁니다"
          fi

      # ── Phase 4: 🐋 Whale Alert (전체 시장 돈 흐름 스캐닝) ───
      - name: 🐋 Whale Alert — Market-Wide Scan & Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          echo "🐋 1단계: 미국·한국 시장 전체 스캔"
          node scripts/scan-whale-activity.js || echo "✅ 유의미한 시그널 없음"
          echo "🐋 2단계: Top 시그널 AI 심층분석"
          node scripts/generate-whale-analysis.js || echo "✅ 분석 대상 없음"

      # ── 카드뉴스 30일 보존 정책 (디스크 폭발 방지) ──────────
      - name: 🧹 Cleanup Old Card News (30-day retention)
        run: |
          CARDS_DIR="public/cards"
          if [ -d "$CARDS_DIR" ]; then
            CUTOFF=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
            echo "📅 보존 기준일: $CUTOFF (이전 날짜 폴더 삭제)"
            for dir in "$CARDS_DIR"/*/; do
              dirname=$(basename "$dir")
              if [[ "$dirname" < "$CUTOFF" ]]; then
                echo "  🗑️ 삭제: $dir"
                rm -rf "$dir"
              fi
            done
            echo "✅ 카드뉴스 정리 완료"
          fi

      # ── 커밋 & 푸시 ────────────────────────────────────────
      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "EconPedia AI Publisher"
          git config --global user.email "actions@github.com"

          git add \
            src/pages/daily/*.astro \
            src/data/daily-articles.json \
            src/pages/blog/*.astro \
            src/data/blog-articles.json \
            src/pages/whale/*.astro \
            src/data/whale-analyses.json \
            src/pages/portfolio/*.astro \
            src/data/portfolio-*.json \
            src/data/insider-*.json \
            public/cards/

          # 변경사항이 없으면 종료
          if git diff --cached --quiet; then
            echo "No new content generated. Skipping commit."
            exit 0
          fi

          # 커밋 전 원격 최신화 (fetch → rebase → 재스테이징)
          git stash
          git fetch origin main
          git rebase origin/main
          git stash pop

          # 재스테이징 (stash pop 후 unstaged 상태가 될 수 있음)
          git add \
            src/pages/daily/*.astro \
            src/data/daily-articles.json \
            src/pages/blog/*.astro \
            src/data/blog-articles.json \
            src/pages/whale/*.astro \
            src/data/whale-analyses.json \
            src/pages/portfolio/*.astro \
            src/data/portfolio-*.json \
            src/data/insider-*.json \
            public/cards/

          git commit -m "docs: Auto-published daily briefing + blog + card news"

          # push 실패 시 최대 3회 재시도
          for i in 1 2 3; do
            if git push origin main; then
              echo "✅ Push 성공 (시도 $i)"
              break
            fi
            echo "⚠️ Push 실패 (시도 $i/3) — 원격 변경 후 재시도..."
            git fetch origin main
            git rebase origin/main
            sleep 5
          done

      # ── 배포 워크플로우 트리거 ──────────────────────────────
      # GITHUB_TOKEN으로 푸시한 커밋은 deploy.yml을 자동 트리거하지 않으므로
      # GitHub API를 통해 workflow_dispatch로 직접 호출합니다.
      - name: 🚀 Trigger Deploy Workflow
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DEPLOY_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}' \
          && echo "✅ Deploy workflow triggered" \
          || echo "⚠️ Deploy trigger failed (non-critical)"

      # ── 검색엔진 Indexing 핑 (Google Sitemap + IndexNow) ────────
      - name: 🚀 Ping Search Engine Indexing
        if: always()
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/ping-google-indexing.js

      # ── 뉴스레터 이메일 발송 ─────────────────────────────
      - name: 📧 Send Newsletter Email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM || 'EconPedia <onboarding@resend.dev>' }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
        run: node scripts/send-newsletter.js

      # ── 서버 리소스 수집 (SSH) ────────────────────────────
      - name: 📊 Collect Server Metrics
        if: always()
        id: server_metrics
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
        run: |
          # SSH 키가 없으면 스킵
          if [ -z "$OCI_SSH_KEY" ]; then
            echo "⚠️ OCI_SSH_KEY 없음 - 서버 메트릭 수집 건너뜀"
            echo "SERVER_CPU=N/A"       >> $GITHUB_OUTPUT
            echo "SERVER_MEM=N/A"       >> $GITHUB_OUTPUT
            echo "SERVER_DISK=N/A"      >> $GITHUB_OUTPUT
            echo "SERVER_DOCKER=N/A"    >> $GITHUB_OUTPUT
            echo "SERVER_UPTIME=N/A"    >> $GITHUB_OUTPUT
            echo "SERVER_REACHABLE=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # SSH 키 파일 생성
          mkdir -p ~/.ssh
          echo "$OCI_SSH_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

          # 서버에서 메트릭 수집 (단일 SSH 연결)
          METRICS=$(ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -i ~/.ssh/oci_key \
            "$OCI_USER@$OCI_HOST" \
            'echo "CPU:$(top -bn1 | grep "Cpu(s)" | awk "{print 100-\$8}")%" && \
             echo "MEM:$(free -m | awk "/^Mem/{printf \"%.0f%%\", \$3/\$2*100}")" && \
             echo "DISK:$(df -h / | awk "NR==2{print \$5}")" && \
             echo "UPTIME:$(uptime -p | sed s/up\ //)" && \
             echo "DOCKER:$(sudo docker ps --filter name=econpedia --format "{{.Status}}" 2>/dev/null || echo unknown)"' 2>/dev/null) || {
            echo "⚠️ SSH 연결 실패"
            echo "SERVER_CPU=연결 실패"    >> $GITHUB_OUTPUT
            echo "SERVER_MEM=연결 실패"    >> $GITHUB_OUTPUT
            echo "SERVER_DISK=연결 실패"   >> $GITHUB_OUTPUT
            echo "SERVER_DOCKER=연결 실패" >> $GITHUB_OUTPUT
            echo "SERVER_UPTIME=연결 실패" >> $GITHUB_OUTPUT
            echo "SERVER_REACHABLE=false"  >> $GITHUB_OUTPUT
            exit 0
          }

          echo "서버 메트릭:" && echo "$METRICS"

          CPU=$(echo "$METRICS"    | grep '^CPU:'    | cut -d: -f2)
          MEM=$(echo "$METRICS"    | grep '^MEM:'    | cut -d: -f2)
          DISK=$(echo "$METRICS"   | grep '^DISK:'   | cut -d: -f2)
          UPTIME=$(echo "$METRICS" | grep '^UPTIME:' | cut -d: -f2)
          DOCKER=$(echo "$METRICS" | grep '^DOCKER:' | cut -d: -f2-)

          echo "SERVER_CPU=${CPU:-N/A}"       >> $GITHUB_OUTPUT
          echo "SERVER_MEM=${MEM:-N/A}"       >> $GITHUB_OUTPUT
          echo "SERVER_DISK=${DISK:-N/A}"     >> $GITHUB_OUTPUT
          echo "SERVER_UPTIME=${UPTIME:-N/A}" >> $GITHUB_OUTPUT
          echo "SERVER_DOCKER=${DOCKER:-N/A}" >> $GITHUB_OUTPUT
          echo "SERVER_REACHABLE=true"        >> $GITHUB_OUTPUT

          # SSH 키 삭제
          rm -f ~/.ssh/oci_key

      # ── 슬랙 현황 리포트 발송 ─────────────────────────────
      - name: 💬 Send Slack Status Report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SERVER_CPU: ${{ steps.server_metrics.outputs.SERVER_CPU }}
          SERVER_MEM: ${{ steps.server_metrics.outputs.SERVER_MEM }}
          SERVER_DISK: ${{ steps.server_metrics.outputs.SERVER_DISK }}
          SERVER_UPTIME: ${{ steps.server_metrics.outputs.SERVER_UPTIME }}
          SERVER_DOCKER: ${{ steps.server_metrics.outputs.SERVER_DOCKER }}
          SERVER_REACHABLE: ${{ steps.server_metrics.outputs.SERVER_REACHABLE }}
        run: node scripts/send-slack-status.js
