name: 📰 Daily Auto Publisher

on:
  schedule:
    # Runs at 22:00 UTC (07:00 KST) every day
    - cron: '0 22 * * *'
  # Allows manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install

      - name: 🤖 Generate Daily Briefing Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/daily-briefing.js

      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "EconPedia AI Publisher"
          git config --global user.email "actions@github.com"
          git add src/pages/daily/*.astro
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No new article generated."
          else
            git commit -m "docs(daily): Auto-published daily briefing"
            git push origin main
          fi
