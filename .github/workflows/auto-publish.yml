name: 📰 Daily Auto Publisher

on:
  schedule:
    # Runs at 22:00 UTC (07:00 KST) every day
    - cron: '0 22 * * *'
  # Allows manual triggering
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install

      - name: 🤖 Generate Daily Briefing Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/daily-briefing.js

      - name: 🚀 Commit and Push
        run: |
          git config --global user.name "EconPedia AI Publisher"
          git config --global user.email "actions@github.com"
          git add src/pages/daily/*.astro src/data/daily-articles.json
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No new article generated."
          else
            git commit -m "docs(daily): Auto-published daily briefing"
            git push origin main
          fi

      # ── 뉴스레터 이메일 발송 ─────────────────────────────
      - name: 📧 Send Newsletter Email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM || 'EconPedia <onboarding@resend.dev>' }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
        run: node scripts/send-newsletter.js

      # ── 슬랙 현황 리포트 발송 ─────────────────────────────
      - name: 💬 Send Slack Status Report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/send-slack-status.js

