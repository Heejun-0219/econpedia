name: CI / Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.9.0'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check types (Astro)
      run: npx astro check

    - name: Build Astro project
      run: npm run build
