name: 🚀 Deploy EconPedia

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: heejun-0219/econpedia

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # === 1. Checkout ===
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # === 2. Docker Buildx ===
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # === 3. Login to GHCR ===
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # === 4. Build & Push ===
      - name: 🏗 Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === 5. Deploy to Oracle Cloud ===
      - name: 🚀 Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            echo "🔐 Logging in to GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u heejun-0219 --password-stdin

            echo "📥 Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "🔄 Stopping old container..."
            docker stop econpedia 2>/dev/null || true
            docker rm econpedia 2>/dev/null || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name econpedia \
              --restart unless-stopped \
              -p 80:80 \
              --memory=128m \
              --cpus=0.5 \
              --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" \
              --health-interval=30s \
              --health-timeout=3s \
              --health-retries=3 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete!"
            docker ps --filter name=econpedia
