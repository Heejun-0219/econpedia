name: 🚀 Deploy EconPedia

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: heejun-0219/econpedia

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # === 1. Checkout ===
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # === 2. Docker Buildx ===
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # === 3. Login to GHCR ===
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # === 4. Build & Push ===
      - name: 🏗 Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === 5. Copy Docker Compose File ===
      - name: 📁 Copy docker-compose.yml to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/econpedia"

      # === 6. Deploy via Docker Compose (Graceful) ===
      - name: 🚀 Deploy via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /opt/econpedia
            
            echo "🔐 GHCR Login..."
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u heejun-0219 --password-stdin

            echo "📝 Creating .env file securely..."
            cat << 'EOF' > .env
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_AUDIENCE_ID=${{ secrets.RESEND_AUDIENCE_ID }}
            ALLOWED_ORIGIN=https://econpedia.dedyn.io
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            EOF
            chmod 600 .env

            echo "📥 Pulling latest image..."
            sudo docker compose pull

            echo "🚀 Starting new containers with minimal downtime..."
            # docker compose up -d recreates containers that have changes.
            # with nginx and api split, they will restart gracefully without command line secrets exposure.
            sudo docker compose up -d

            echo "🧹 Cleanup..."
            sudo docker image prune -f
            echo "✨ Deployment successful!"
            sudo docker compose ps
