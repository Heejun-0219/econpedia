worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # === Gzip Compression (SEO 속도 최적화) ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # === HTTP -> HTTPS Redirect ===
    server {
        listen 80;
        server_name econpedia.dedyn.io www.econpedia.dedyn.io;
        return 301 https://$host$request_uri;
    }

    # === HTTPS Server ===
    server {
        listen 443 ssl;
        server_name econpedia.dedyn.io www.econpedia.dedyn.io;

        ssl_certificate /etc/letsencrypt/live/econpedia.dedyn.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/econpedia.dedyn.io/privkey.pem;
        
        # SSL Optimization
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /usr/share/nginx/html;
        index index.html;

        # === Static Asset Caching (체류 시간 + SEO 점수) ===
        location ~* \.(css|js|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }

        # === HTML — no cache (항상 최신 버전) ===
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # === API 서버 프록시 (Subscribe/Unsubscribe) ===
        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
            proxy_connect_timeout 5s;
        }

        # === SPA/SSG fallback ===
        location / {
            try_files $uri $uri/ $uri.html /index.html;
        }

        # === Security Headers ===
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # === Error Pages ===
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
